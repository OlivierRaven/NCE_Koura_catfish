project:
  type: manuscript
  output-dir: docs
  post-render: deploy.R

execute:
  freeze: false
  cache: false

manuscript:
  article: index.qmd
  notebooks:
    - notebook: analysis.qmd
      title: "Analysis Notebook"

format:
  html:
    theme: cosmo
  pdf:
    includes:
      in-header: references/header.tex
    latex-engine: xelatex
    number-sections: true
    toc: true
    colorlinks: true
    link-citations: true
    header-includes: |
      \usepackage[left]{lineno}
      \linenumbers
  docx:
    reference-doc: references/reference.docx

bibliography: references/references.bib
csl: references/apa.csl
