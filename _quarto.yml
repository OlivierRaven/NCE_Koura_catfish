project:
  type: manuscript

manuscript:
  article: index.qmd
  notebooks:
    - notebook: analysis.qmd
      title: "Analysis Notebook"
  
format:
  html:
    theme: 
      light: flatly
      dark: darkly
    code-fold: true          # Code hidden by default, can expand
    code-tools: true         # Adds code download button
    code-summary: "View Code"
    toc: true                # Table of contents
    toc-depth: 3
    number-sections: true
    fig-width: 8
    fig-height: 6
    embed-resources: true    # Single HTML file with everything
    
bibliography: references/references.bib
csl: references/apa.csl